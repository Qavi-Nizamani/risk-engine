name: Publish @vigilry/node

on:
  push:
    tags:
      - "sdk/v*"   # trigger on tags like: sdk/v0.1.0, sdk/v1.2.3

jobs:
  publish:
    name: Build & Publish SDK
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # required for npm provenance

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          registry-url: "https://registry.npmjs.org"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build SDK
        run: pnpm --filter @vigilry/node build

      - name: Publish to npm
        run: pnpm --filter @vigilry/node publish --access public --no-git-checks --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
