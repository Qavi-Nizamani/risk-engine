# Nginx reverse proxy — risk-engine web (Next.js)
#
# VPS setup:
#   sudo cp web.conf /etc/nginx/sites-available/risk-engine-web
#   sudo ln -s /etc/nginx/sites-available/risk-engine-web /etc/nginx/sites-enabled/
#   sudo certbot --nginx -d your-domain.com -d www.your-domain.com
#   sudo nginx -t && sudo systemctl reload nginx
#
# Replace "your-domain.com" with your actual domain before copying.

upstream next_app {
    server 127.0.0.1:3000;
    keepalive 64;
}

# ─── HTTP → HTTPS redirect ────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name your-domain.com www.your-domain.com;

    # Let Certbot handle ACME challenges
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS ───────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name your-domain.com www.your-domain.com;

    # TLS certificates (populated by Certbot / Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;

    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options            SAMEORIGIN always;
    add_header X-Content-Type-Options     nosniff    always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied    any;
    gzip_types
        text/plain text/css text/xml
        application/json application/javascript application/xml+rss
        image/svg+xml;

    # ── Next.js content-hashed static assets — immutable cache ───────────────
    # _next/static filenames include a content hash so they can be cached forever.
    location /_next/static/ {
        proxy_pass http://next_app;
        add_header Cache-Control "public, max-age=31536000, immutable";
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Next.js image optimisation ────────────────────────────────────────────
    location /_next/image {
        proxy_pass http://next_app;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "public, max-age=86400";
    }

    # ── Well-known static files ───────────────────────────────────────────────
    location ~* ^/(favicon\.ico|robots\.txt|sitemap\.xml)$ {
        proxy_pass http://next_app;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 1d;
    }

    # ── Main application ──────────────────────────────────────────────────────
    location / {
        proxy_pass http://next_app;

        proxy_http_version 1.1;
        # WebSocket / SSE support (for future use / route handlers)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        proxy_buffering    on;
        proxy_buffer_size  16k;
        proxy_buffers      4 32k;
    }
}
